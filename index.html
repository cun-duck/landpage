<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Particle Landing Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
            background-color: #050505;
            font-family: 'Inter', sans-serif;
            cursor: crosshair; 
        }
        canvas {
            display: block;
        }
        .content-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            pointer-events: none;
            z-index: 10;
        }
        .welcome-text {
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            transition: letter-spacing 0.5s ease;
        }
        /* Efek saat mouse ditekan */
        body:active .welcome-text {
            letter-spacing: 0.2em;
            opacity: 1;
        }
    </style>
</head>
<body>

    <div id="textOverlay" class="content-overlay">
        <h1 class="welcome-text text-4xl md:text-6xl font-extralight tracking-widest uppercase opacity-80 mb-4 select-none">
            Selamat Datang
        </h1>
        <div class="h-px w-16 bg-gradient-to-r from-transparent via-white to-transparent mx-auto opacity-40"></div>
    </div>

    <canvas id="particleCanvas"></canvas>

    <script>
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');

        let width, height, particles;
        const particleCount = 300;
        const colors = ['#FF3F8E', '#04C2C9', '#2E55C1', '#F9D423', '#FF4E50', '#E1F5C4'];
        
        const mouse = {
            x: -1000,
            y: -1000,
            clicked: false
        };

        function init() {
            resize();
            createParticles();
            animate();
        }

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.radius = Math.random() * 1.5 + 0.5;
                const baseDistance = Math.min(width, height) * 0.28;
                this.distance = baseDistance + (Math.random() * 100 - 50); 
                this.angle = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() * 0.0008) + 0.0004; 
                this.direction = Math.random() > 0.5 ? 1 : -1;
                this.rotationSpeed *= this.direction;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.noiseScale = Math.random() * 30 + 15;
                this.phase = Math.random() * Math.PI * 2;
                this.opacity = Math.random() * 0.5 + 0.3;
                
                this.vx = 0; 
                this.vy = 0; 
                this.friction = 0.96; 
            }

            draw() {
                const wobble = Math.sin(this.angle * 1.5 + this.phase) * this.noiseScale;
                const currentDist = this.distance + wobble;

                
                let baseX = width / 2 + Math.cos(this.angle) * currentDist;
                let baseY = height / 2 + Math.sin(this.angle) * currentDist;

                
                const dx = mouse.x - (baseX + this.vx);
                const dy = mouse.y - (baseY + this.vy);
                const distToMouse = Math.sqrt(dx * dx + dy * dy);
                const maxDist = 180;

                if (distToMouse < maxDist) {
                    const force = (maxDist - distToMouse) / maxDist;
                    
                    const strength = mouse.clicked ? 15 : 2;
                    this.vx -= (dx / distToMouse) * force * strength;
                    this.vy -= (dy / distToMouse) * force * strength;
                }

                
                this.vx *= this.friction;
                this.vy *= this.friction;

                
                ctx.beginPath();
                ctx.arc(baseX + this.vx, baseY + this.vy, this.radius, 0, Math.PI * 2);
                
               
                if (distToMouse < 80) {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = this.color;
                } else {
                    ctx.shadowBlur = 0;
                }

                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.opacity;
                ctx.fill();
                ctx.closePath();

                this.angle += this.rotationSpeed;
            }
        }

        function createParticles() {
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => p.draw());
            requestAnimationFrame(animate);
        }

       
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        window.addEventListener('mousedown', () => {
            mouse.clicked = true;
            
            setTimeout(() => mouse.clicked = false, 150);
        });

        window.addEventListener('mouseup', () => {
            mouse.clicked = false;
        });

        window.addEventListener('mouseout', () => {
            mouse.x = -1000;
            mouse.y = -1000;
        });

        window.addEventListener('resize', () => {
            resize();
            createParticles();
        });

        init();
    </script>
</body>
</html>
